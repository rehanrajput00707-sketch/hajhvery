<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodfight - Order with Points Discount</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Modal and discount styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.open { display: flex; }
        .order-modal, .discount-modal {
            background: #111;
            border: 2px solid #FFD700;
            border-radius: 24px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .order-modal h2, .discount-modal h2 {
            color: #FFD700;
            font-family: 'Bebas Neue', cursive;
            font-size: 2rem;
            margin-bottom: 1.5rem;
        }
        .order-input, .discount-input {
            width: 100%;
            padding: 0.8rem;
            background: #222;
            border: 1px solid #444;
            border-radius: 12px;
            color: white;
            margin-bottom: 1rem;
        }
        .order-label {
            display: block;
            color: #FFD700;
            margin-bottom: 0.3rem;
        }
        .size-selector {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .size-option {
            background: #222;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 0.5rem;
            text-align: center;
            cursor: pointer;
            flex: 1;
        }
        .size-option.selected {
            background: #FFD700;
            color: #0a0a0a;
        }
        .discount-section {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 1rem;
            margin: 1rem 0;
        }
        .points-badge-large {
            background: #FFD700;
            color: #0a0a0a;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-weight: bold;
        }
        .btn-primary {
            background: #FFD700;
            color: #0a0a0a;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 0.5rem;
        }
        .cart-fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #FFD700;
            color: #0a0a0a;
            border: none;
            border-radius: 50px;
            padding: 1rem 1.5rem;
            cursor: pointer;
            display: none;
            z-index: 500;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #FFD700;
            color: #0a0a0a;
            padding: 12px 24px;
            border-radius: 50px;
            display: none;
            z-index: 2000;
        }
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 2rem auto;
        }
        .filter-btn {
            background: #1a1a1a;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .filter-btn.active {
            background: #FFD700;
            color: #0a0a0a;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            padding: 2rem;
        }
        .menu-card {
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        .points-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #FFD700;
            color: #0a0a0a;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        @media (max-width: 768px) {
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">FOODFIGHT</div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html" class="active">Menu</a></li>
                <li><a href="game.html">Game</a></li>
                <li><a href="account.html">Contact</a></li>
                <li><a href="account.html"><i class="fas fa-user-circle"></i> Account</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <div class="filter-bar" id="filterBar"></div>
    <div class="menu-grid" id="menuGrid">Loading...</div>

    <!-- Order Modal -->
    <div class="modal-overlay" id="orderModal">
        <div class="order-modal">
            <h2>Place Order</h2>
            <div id="orderContent"></div>
        </div>
    </div>

    <div id="orderToast" class="toast"></div>

    <footer style="text-align:center; padding:2rem; background:#000;">© 2025 Foodfight Fast Food</footer>

    <script>
        let allItems = [];
        let currentUser = null;
        let selectedItem = null;
        let selectedSize = null;
        let userPoints = 0;
        let appliedDiscount = 0;     // PKR discount amount
        let discountPointsUsed = 0;
        let discountConfig = { pointsToPkr: 1, maxDiscountPercent: 50 };

        // Pizza sizes
        const pizzaSizes = {
            'Small': { multiplier: 0.7, label: 'Small (6")' },
            'Medium': { multiplier: 1.0, label: 'Medium (9")' },
            'Large': { multiplier: 1.4, label: 'Large (12")' },
            'Extra Large': { multiplier: 1.8, label: 'Extra Large (14")' }
        };

        // Helper
        function showToast(msg, isErr = false) {
            const toast = document.getElementById('orderToast');
            toast.textContent = msg;
            toast.style.background = isErr ? '#ff4444' : '#FFD700';
            toast.style.color = isErr ? 'white' : '#0a0a0a';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        // Load discount config from DB
        async function loadDiscountConfig() {
            try {
                const { data } = await supabase.from('discount_config').select('*').single();
                if (data) {
                    discountConfig = {
                        pointsToPkr: data.points_to_pkr || 1,
                        maxDiscountPercent: data.max_discount_percent || 50,
                        minPointsToRedeem: data.min_points_to_redeem || 10
                    };
                }
            } catch(e) { console.log('using default config'); }
        }

        // Load user points
        async function loadUserPoints(email) {
            if (!email) return 0;
            const { data } = await supabase.from('points_transactions').select('points').eq('user_email', email);
            const total = data?.reduce((s, t) => s + t.points, 0) || 0;
            userPoints = total;
            return total;
        }

        // Deduct points when used
        async function deductPoints(email, points, reason) {
            await supabase.from('points_transactions').insert([{ user_email: email, points: -points, reason: reason }]);
        }

        // Check login session
        async function checkSession() {
            const { data: { user } } = await supabase.auth.getUser();
            currentUser = user;
            if (currentUser) await loadUserPoints(currentUser.email);
            await loadDiscountConfig();
            await loadMenu();
        }

        // Load menu items
        async function loadMenu() {
            const { data } = await supabase.from('menu_items').select('*').eq('is_available', true);
            allItems = data || [];
            renderFilters();
            renderMenu('all');
        }

        function renderFilters() {
            const categories = [...new Set(allItems.map(i => i.category))];
            const filterBar = document.getElementById('filterBar');
            filterBar.innerHTML = `<button class="filter-btn active" data-cat="all">ALL</button>` +
                categories.map(cat => `<button class="filter-btn" data-cat="${cat}">${cat}</button>`).join('');
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderMenu(btn.dataset.cat);
                });
            });
        }

        function renderMenu(category) {
            const grid = document.getElementById('menuGrid');
            let filtered = category === 'all' ? allItems : allItems.filter(i => i.category === category);
            if (!filtered.length) { grid.innerHTML = '<p style="text-align:center;">No items</p>'; return; }
            grid.innerHTML = filtered.map(item => `
                <div class="menu-card">
                    <div class="points-badge">🏆 ${item.points_reward || 10} pts</div>
                    <img src="${item.image_url || 'https://placehold.co/300x200/111/FFD700?text=Food'}" width="100%">
                    <h3>${escapeHtml(item.name)}</h3>
                    <p>${escapeHtml(item.description?.substring(0,60) || '')}</p>
                    <div class="price">PKR ${item.price}</div>
                    <button class="order-btn-small" onclick="openOrderModal('${item.id}')">Order Now</button>
                </div>
            `).join('');
        }

        window.openOrderModal = async function(itemId) {
            if (!currentUser) {
                showToast('Please login first', true);
                setTimeout(() => window.location.href = 'account.html', 1500);
                return;
            }
            selectedItem = allItems.find(i => i.id === itemId);
            selectedSize = (selectedItem.category === 'Pizza') ? 'Medium' : null;
            appliedDiscount = 0;
            discountPointsUsed = 0;
            renderOrderModal();
            document.getElementById('orderModal').classList.add('open');
        };

        function renderOrderModal() {
            if (!selectedItem) return;
            const isPizza = selectedItem.category === 'Pizza';
            let basePrice = selectedItem.price;
            if (isPizza && selectedSize) basePrice = Math.round(selectedItem.price * pizzaSizes[selectedSize].multiplier);
            const finalPrice = Math.max(basePrice - appliedDiscount, 0);

            let sizeHtml = '';
            if (isPizza) {
                sizeHtml = `
                    <label class="order-label">Select Size:</label>
                    <div class="size-selector">
                        ${Object.entries(pizzaSizes).map(([size, data]) => `
                            <div class="size-option ${selectedSize === size ? 'selected' : ''}" onclick="selectSize('${size}')">
                                ${data.label}<br>PKR ${Math.round(selectedItem.price * data.multiplier)}
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            const maxDiscountPossible = (basePrice * discountConfig.maxDiscountPercent) / 100;
            const maxPointsToUse = Math.floor(maxDiscountPossible / discountConfig.pointsToPkr);

            const content = `
                <div class="item-detail">
                    <h3>${escapeHtml(selectedItem.name)}${isPizza ? ` (${selectedSize})` : ''}</h3>
                    <p>Base price: PKR ${basePrice}</p>
                </div>
                ${sizeHtml}
                <div class="discount-section">
                    <div style="display:flex; justify-content:space-between;">
                        <span>Your Points:</span>
                        <span class="points-badge-large">🏆 ${userPoints} pts</span>
                    </div>
                    <label class="order-label">Use points for discount (${discountConfig.pointsToPkr} pt = PKR 1)</label>
                    <input type="number" id="pointsToUse" class="order-input" placeholder="Enter points" min="${discountConfig.minPointsToRedeem}" max="${Math.min(userPoints, maxPointsToUse)}">
                    <button class="btn-primary" onclick="applyDiscount()">Apply Discount</button>
                    ${appliedDiscount > 0 ? `<p style="color:#FFD700;">Discount applied: -PKR ${appliedDiscount} (${discountPointsUsed} pts)</p><button onclick="removeDiscount()" style="background:#333; color:white; border:none; padding:0.3rem 0.8rem;">Remove</button>` : ''}
                </div>
                <div class="order-summary">
                    <p><strong>Total: PKR ${finalPrice}</strong></p>
                </div>
                <label class="order-label">Full Name</label>
                <input type="text" id="custName" class="order-input" value="${escapeHtml(currentUser.user_metadata?.full_name || '')}">
                <label class="order-label">Phone</label>
                <input type="text" id="custPhone" class="order-input" value="${escapeHtml(currentUser.user_metadata?.phone || '')}">
                <label class="order-label">Address</label>
                <textarea id="custAddress" class="order-input" rows="2">${escapeHtml(currentUser.user_metadata?.address || '')}</textarea>
                <button class="btn-primary" onclick="placeOrder(${finalPrice}, ${basePrice})">Confirm Order</button>
                <button class="btn-primary" style="background:#333; margin-top:0.5rem;" onclick="closeOrderModal()">Cancel</button>
            `;
            document.getElementById('orderContent').innerHTML = content;
        }

        window.selectSize = function(size) {
            selectedSize = size;
            appliedDiscount = 0;
            discountPointsUsed = 0;
            renderOrderModal();
        };

        window.applyDiscount = function() {
            let points = parseInt(document.getElementById('pointsToUse')?.value);
            if (isNaN(points) || points < discountConfig.minPointsToRedeem) {
                showToast(`Minimum ${discountConfig.minPointsToRedeem} points required`, true);
                return;
            }
            if (points > userPoints) {
                showToast('Not enough points', true);
                return;
            }
            const isPizza = selectedItem.category === 'Pizza';
            let basePrice = selectedItem.price;
            if (isPizza && selectedSize) basePrice = Math.round(selectedItem.price * pizzaSizes[selectedSize].multiplier);
            const maxDiscount = (basePrice * discountConfig.maxDiscountPercent) / 100;
            const discountAmount = Math.min(points * discountConfig.pointsToPkr, maxDiscount, basePrice - 10);
            if (discountAmount <= 0) {
                showToast('Discount would be zero', true);
                return;
            }
            appliedDiscount = discountAmount;
            discountPointsUsed = points;
            renderOrderModal();
        };

        window.removeDiscount = function() {
            appliedDiscount = 0;
            discountPointsUsed = 0;
            renderOrderModal();
        };

        window.placeOrder = async function(finalPrice, originalPrice) {
            const name = document.getElementById('custName')?.value.trim();
            const phone = document.getElementById('custPhone')?.value.trim();
            const address = document.getElementById('custAddress')?.value.trim();
            if (!name || !phone || !address) {
                showToast('Please fill all fields', true);
                return;
            }
            const isPizza = selectedItem.category === 'Pizza';
            let itemName = selectedItem.name;
            if (isPizza && selectedSize) itemName += ` (${selectedSize})`;

            const itemsOrdered = [{
                id: selectedItem.id,
                name: itemName,
                price: originalPrice,
                qty: 1,
                size: selectedSize || null
            }];

            // Deduct points if discount used
            if (discountPointsUsed > 0) {
                await deductPoints(currentUser.email, discountPointsUsed, `Used ${discountPointsUsed} points for discount on ${selectedItem.name}`);
                await loadUserPoints(currentUser.email);
            }

            const { error } = await supabase.from('orders').insert([{
                customer_name: name,
                customer_phone: phone,
                customer_email: currentUser.email,
                customer_address: address,
                items_ordered: itemsOrdered,
                original_price: originalPrice,
                discount_amount: appliedDiscount,
                points_used: discountPointsUsed,
                total_price: finalPrice,
                status: 'Pending'
            }]);

            if (error) {
                showToast('Order failed: ' + error.message, true);
                return;
            }
            showToast(`Order placed! PKR ${finalPrice}`);
            closeOrderModal();
            // Refresh points display
            await loadUserPoints(currentUser.email);
        };

        function closeOrderModal() {
            document.getElementById('orderModal').classList.remove('open');
            selectedItem = null;
            selectedSize = null;
            appliedDiscount = 0;
            discountPointsUsed = 0;
        }

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

        document.getElementById('hamburger')?.addEventListener('click', () => document.getElementById('navLinks').classList.toggle('active'));
        window.closeOrderModal = closeOrderModal;

        checkSession();
    </script>
</body>
</html>
