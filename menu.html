<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodfight - Full Menu | Fast Food Arifwala</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style1.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* ===== ORDER MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.open { display: flex; }

        .order-modal {
            background: #111;
            border: 2px solid #FFD700;
            border-radius: 24px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .order-modal h2 {
            color: #FFD700;
            font-family: 'Bebas Neue', cursive;
            font-size: 2rem;
            margin-bottom: 1.5rem;
        }
        .order-input {
            width: 100%;
            padding: 0.8rem;
            background: #222;
            border: 1px solid #444;
            border-radius: 12px;
            color: white;
            font-family: 'Poppins', sans-serif;
            margin-bottom: 1rem;
        }
        .order-input:focus { outline: none; border-color: #FFD700; }
        .order-label {
            display: block;
            color: #FFD700;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
        }
        .order-summary-box {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .order-summary-box p { font-size: 0.9rem; color: #ccc; margin: 0.3rem 0; }
        .order-summary-box .total { color: #FFD700; font-weight: bold; font-size: 1.1rem; }
        .msg-error { color: #ff4444; font-size: 0.85rem; margin-bottom: 0.5rem; }
        .msg-success { color: #4caf50; font-size: 0.85rem; margin-bottom: 0.5rem; }
        .login-required-msg {
            background: #1a1a1a;
            border: 1px solid #FFD700;
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            margin-bottom: 1rem;
        }
        .login-required-msg p { color: #ccc; margin-bottom: 0.8rem; }
        .go-login-btn {
            background: #FFD700;
            color: #0a0a0a;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }
        .close-modal-btn {
            background: #333;
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            margin-top: 0.5rem;
            width: 100%;
        }
        .order-now-btn {
            background: #FFD700;
            color: #0a0a0a;
            border: none;
            padding: 0.8rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: bold;
            width: 100%;
            margin-top: 1rem;
        }
        .size-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .size-option {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .size-option.selected {
            background: #FFD700;
            color: #0a0a0a;
            border-color: #FFD700;
        }
        .size-option:hover {
            background: #FFD700;
            color: #0a0a0a;
        }
        .size-name {
            font-weight: bold;
            font-size: 1rem;
        }
        .size-price {
            font-size: 0.8rem;
            color: #aaa;
        }
        .size-option.selected .size-price {
            color: #0a0a0a;
        }
        .item-detail {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .item-detail img {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
        }
        .item-detail-info h4 {
            color: #FFD700;
            margin-bottom: 0.3rem;
        }
        .item-detail-info p {
            color: #aaa;
            font-size: 0.8rem;
        }
        /* Discount styles */
        .discount-section {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #FFD700;
        }
        .points-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }
        .points-badge-large {
            background: #FFD700;
            color: #0a0a0a;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-weight: bold;
        }
        .discount-input-group {
            display: flex;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }
        .discount-input-group input {
            flex: 1;
            padding: 0.5rem;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
        }
        .apply-discount-btn {
            background: #FFD700;
            color: #0a0a0a;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .remove-discount-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <!-- Sticky Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Foodfight</div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html" class="active">Menu</a></li>
                <li><a href="game.html">Game</a></li>
                <li><a href="account.html">Contact</a></li>
                <li><a href="account.html"><i class="fas fa-user-circle"></i> Account</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Menu Header -->
    <section class="menu-header">
        <div class="container">
            <h1>OUR <span class="yellow-text">MENU</span></h1>
            <p class="subtitle">Fresh ingredients, bold flavors, served fast</p>
        </div>
    </section>

    <!-- Category Filters -->
    <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-category="all">ALL</button>
        <button class="filter-btn" data-category="Burgers">🍔 BURGERS</button>
        <button class="filter-btn" data-category="Pizza">🍕 PIZZA</button>
        <button class="filter-btn" data-category="Deals">🔥 DEALS</button>
        <button class="filter-btn" data-category="Drinks">🥤 DRINKS</button>
        <button class="filter-btn" data-category="Fries">🍟 FRIES</button>
        <button class="filter-btn" data-category="Desserts">🍮 DESSERTS</button>
        <button class="filter-btn" data-category="Other">⭐ OTHER</button>
    </div>

    <!-- Menu Grid -->
    <div class="menu-grid" id="menuGrid">
        <div class="loading" style="text-align: center; grid-column: 1/-1;">Loading delicious items...</div>
    </div>

    <!-- ===== ORDER MODAL ===== -->
    <div class="modal-overlay" id="orderOverlay">
        <div class="order-modal">
            <h2><i class="fas fa-receipt"></i> Place Order</h2>
            <div id="orderContent"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="orderToast" style="position:fixed;bottom:20px;right:20px;background:#FFD700;color:#000;padding:12px 24px;border-radius:50px;display:none;z-index:2000;font-weight:bold;font-family:'Poppins',sans-serif;"></div>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">Foodfight</div>
            <p>© 2025 Foodfight Fast Food. All rights reserved.</p>
            <div class="social-icons">
                <i class="fab fa-instagram"></i>
                <i class="fab fa-facebook"></i>
                <i class="fab fa-whatsapp"></i>
            </div>
        </div>
    </footer>

    <script>
        let allMenuItems = [];
        let currentFilter = 'all';
        let loggedInUser = null;
        let selectedItem = null;
        let selectedSize = null;
        let currentPoints = 0;
        let appliedDiscount = 0;
        let discountPointsUsed = 0;

        // Discount configuration (can be modified from admin)
        let discountConfig = {
            pointsToPkr: 1, // 1 point = 1 PKR discount
            maxDiscountPercent: 50, // Max 50% discount
            minPointsToRedeem: 10
        };

        // Pizza size options with price multipliers
        const pizzaSizes = {
            'Small': { multiplier: 0.7, label: 'Small (6")' },
            'Medium': { multiplier: 1.0, label: 'Medium (9")' },
            'Large': { multiplier: 1.4, label: 'Large (12")' },
            'Extra Large': { multiplier: 1.8, label: 'Extra Large (14")' }
        };

        // Mobile nav
        document.getElementById('hamburger')?.addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('active');
        });

        // Load discount config from database
        async function loadDiscountConfig() {
            try {
                const { data, error } = await supabase
                    .from('discount_config')
                    .select('*')
                    .single();
                if (data && !error) {
                    discountConfig = {
                        pointsToPkr: data.points_to_pkr || 1,
                        maxDiscountPercent: data.max_discount_percent || 50,
                        minPointsToRedeem: data.min_points_to_redeem || 10
                    };
                }
            } catch(e) {
                console.log('Using default discount config');
            }
        }

        // Load user points
        async function loadUserPoints(email) {
            if (!email) return 0;
            const { data, error } = await supabase
                .from('points_transactions')
                .select('points')
                .eq('user_email', email);
            if (error) return 0;
            const total = data.reduce((sum, t) => sum + t.points, 0);
            currentPoints = total;
            return total;
        }

        // Deduct points when used
        async function deductPoints(email, points, reason) {
            const { error } = await supabase
                .from('points_transactions')
                .insert([{ user_email: email, points: -points, reason: reason }]);
            if (error) console.error('Error deducting points:', error);
        }

        // Check if user is logged in
        async function checkSession() {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                loggedInUser = user || null;
                if (loggedInUser) {
                    await loadUserPoints(loggedInUser.email);
                    await loadDiscountConfig();
                }
            } catch(e) {
                loggedInUser = null;
            }
        }

        // Load menu items
        async function loadMenuItems() {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = '<div class="loading" style="grid-column:1/-1;">Loading menu...</div>';
            try {
                const { data, error } = await supabase
                    .from('menu_items')
                    .select('*')
                    .eq('is_available', true)
                    .order('category', { ascending: true });
                if (error) throw error;
                allMenuItems = data || [];
                renderMenu();
            } catch (err) {
                console.error('Error loading menu:', err);
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#aaa;">Failed to load menu.</div>';
            }
        }

        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            let filtered = allMenuItems;
            if (currentFilter !== 'all') filtered = allMenuItems.filter(i => i.category === currentFilter);
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#aaa;">No items in this category yet.</div>';
                return;
            }
            grid.innerHTML = filtered.map(item => `
                <div class="menu-card fade-in">
                    <div class="points-badge">🏆 ${item.points_reward || 10} pts</div>
                    <img src="${item.image_url || 'https://placehold.co/400x300/111111/FFD700?text=Foodfight'}" alt="${escapeHtml(item.name)}" onerror="this.src='https://placehold.co/400x300/111111/FFD700?text=Foodfight'">
                    <h3>${escapeHtml(item.name)}</h3>
                    <div class="desc">${escapeHtml(item.description?.substring(0,80) || 'Signature taste')}</div>
                    <div class="price" id="price-${item.id}">PKR ${item.price}</div>
                    <button class="add-order-btn" onclick="openOrderModal('${item.id}')">
                        <i class="fas fa-tag"></i> Order Now
                    </button>
                </div>
            `).join('');
        }

        // Open Order Modal
        function openOrderModal(itemId) {
            const item = allMenuItems.find(i => i.id === itemId);
            if (!item) return;
            selectedItem = item;
            appliedDiscount = 0;
            discountPointsUsed = 0;
            
            // Reset size selection
            if (item.category === 'Pizza') {
                selectedSize = 'Medium';
            } else {
                selectedSize = 'Regular';
            }
            
            renderOrderModal();
            document.getElementById('orderOverlay').classList.add('open');
        }

        // Apply discount using points
        function applyPointsDiscount(pointsToUse) {
            const isPizza = selectedItem.category === 'Pizza';
            let originalPrice = selectedItem.price;
            if (isPizza && selectedSize) {
                originalPrice = Math.round(selectedItem.price * pizzaSizes[selectedSize].multiplier);
            }
            
            const maxDiscountPossible = (originalPrice * discountConfig.maxDiscountPercent) / 100;
            const pointsValue = pointsToUse * discountConfig.pointsToPkr;
            let discountAmount = Math.min(pointsValue, maxDiscountPossible, originalPrice - 10);
            
            if (pointsToUse > currentPoints) {
                document.getElementById('discountMsg').innerHTML = '<span style="color:#ff4444;">❌ Not enough points!</span>';
                return;
            }
            
            if (pointsToUse < discountConfig.minPointsToRedeem) {
                document.getElementById('discountMsg').innerHTML = `<span style="color:#ff4444;">❌ Minimum ${discountConfig.minPointsToRedeem} points to redeem!</span>`;
                return;
            }
            
            appliedDiscount = discountAmount;
            discountPointsUsed = pointsToUse;
            document.getElementById('discountMsg').innerHTML = `<span style="color:#4caf50;">✅ Discount applied: PKR ${discountAmount} (${pointsToUse} points)</span>`;
            renderOrderModal();
        }

        function removeDiscount() {
            appliedDiscount = 0;
            discountPointsUsed = 0;
            renderOrderModal();
        }

        function renderOrderModal() {
            if (!selectedItem) return;
            
            const isPizza = selectedItem.category === 'Pizza';
            const content = document.getElementById('orderContent');
            
            // Calculate current price based on size
            let originalPrice = selectedItem.price;
            if (isPizza && selectedSize) {
                originalPrice = Math.round(selectedItem.price * pizzaSizes[selectedSize].multiplier);
            }
            
            const finalPrice = Math.max(originalPrice - appliedDiscount, 0);
            
            if (!loggedInUser) {
                // Not logged in — show login prompt
                content.innerHTML = `
                    <div class="login-required-msg">
                        <p>⚠️ You need to login first to place an order.</p>
                        <button class="go-login-btn" onclick="window.location.href='account.html'">
                            <i class="fas fa-sign-in-alt"></i> Login / Register
                        </button>
                    </div>
                    <button class="close-modal-btn" onclick="closeOrderModal()">Cancel</button>
                `;
            } else {
                // Logged in — show order form with discount section
                const meta = loggedInUser.user_metadata || {};
                
                // Size selector HTML (only for pizza)
                let sizeSelectorHtml = '';
                if (isPizza) {
                    sizeSelectorHtml = `
                        <label class="order-label">Select Size:</label>
                        <div class="size-selector" id="sizeSelector">
                            ${Object.entries(pizzaSizes).map(([size, data]) => `
                                <div class="size-option ${selectedSize === size ? 'selected' : ''}" onclick="selectSize('${size}')">
                                    <div class="size-name">${data.label}</div>
                                    <div class="size-price">PKR ${Math.round(selectedItem.price * data.multiplier)}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
                
                content.innerHTML = `
                    <div class="item-detail">
                        <img src="${selectedItem.image_url || 'https://placehold.co/70x70/333/FFD700?text=Food'}" onerror="this.src='https://placehold.co/70x70/333/FFD700?text=Food'">
                        <div class="item-detail-info">
                            <h4>${escapeHtml(selectedItem.name)}</h4>
                            <p>${escapeHtml(selectedItem.description?.substring(0,60) || 'Delicious taste')}</p>
                        </div>
                    </div>
                    
                    ${sizeSelectorHtml}
                    
                    <div class="discount-section">
                        <div class="points-info">
                            <span><i class="fas fa-star"></i> Your Points:</span>
                            <span class="points-badge-large">🏆 ${currentPoints} pts</span>
                        </div>
                        <div class="discount-input-group">
                            <input type="number" id="pointsToRedeem" placeholder="Points to redeem (${discountConfig.minPointsToRedeem}+)" min="${discountConfig.minPointsToRedeem}" max="${currentPoints}">
                            <button class="apply-discount-btn" onclick="applyPointsDiscount(parseInt(document.getElementById('pointsToRedeem').value))">
                                Apply Discount
                            </button>
                        </div>
                        <div id="discountMsg"></div>
                        ${appliedDiscount > 0 ? `<button class="remove-discount-btn" onclick="removeDiscount()">Remove Discount</button>` : ''}
                        <small style="color:#aaa;">${discountConfig.pointsToPkr} point = PKR 1 | Max ${discountConfig.maxDiscountPercent}% off</small>
                    </div>
                    
                    <div class="order-summary-box">
                        <p><strong>Item:</strong> ${escapeHtml(selectedItem.name)}${isPizza ? ` (${selectedSize})` : ''}</p>
                        ${appliedDiscount > 0 ? `<p>Original Price: PKR ${originalPrice}</p>` : ''}
                        ${appliedDiscount > 0 ? `<p>Discount: -PKR ${appliedDiscount}</p>` : ''}
                        <p class="total">Total: PKR ${finalPrice}</p>
                        ${appliedDiscount > 0 ? `<p style="font-size:0.8rem; color:#aaa;">Points used: ${discountPointsUsed}</p>` : ''}
                    </div>

                    <label class="order-label">Full Name</label>
                    <input class="order-input" id="orderName" value="${escapeHtml(meta.full_name || '')}" placeholder="Your name">

                    <label class="order-label">Phone Number</label>
                    <input class="order-input" id="orderPhone" value="${escapeHtml(meta.phone || '')}" placeholder="03XXXXXXXXX">

                    <label class="order-label">Delivery Address</label>
                    <input class="order-input" id="orderAddress" value="${escapeHtml(meta.address || '')}" placeholder="Your address">

                    <div id="orderMsg"></div>

                    <button class="order-now-btn" onclick="placeDirectOrder(${finalPrice})">
                        <i class="fas fa-check"></i> Confirm Order (PKR ${finalPrice})
                    </button>
                    <button class="close-modal-btn" onclick="closeOrderModal()">Cancel</button>
                `;
            }
        }

        // Select pizza size
        function selectSize(size) {
            selectedSize = size;
            appliedDiscount = 0;
            discountPointsUsed = 0;
            renderOrderModal();
        }

        function closeOrderModal() {
            document.getElementById('orderOverlay').classList.remove('open');
            selectedItem = null;
            selectedSize = null;
            appliedDiscount = 0;
            discountPointsUsed = 0;
        }

        async function placeDirectOrder(finalPrice) {
            const name = document.getElementById('orderName')?.value.trim();
            const phone = document.getElementById('orderPhone')?.value.trim();
            const address = document.getElementById('orderAddress')?.value.trim();
            const msgDiv = document.getElementById('orderMsg');

            if (!name || !phone || !address) {
                msgDiv.innerHTML = '<div class="msg-error">❌ Please fill in all fields</div>';
                return;
            }

            const isPizza = selectedItem.category === 'Pizza';
            let originalPrice = selectedItem.price;
            let sizeInfo = '';
            
            if (isPizza && selectedSize) {
                originalPrice = Math.round(selectedItem.price * pizzaSizes[selectedSize].multiplier);
                sizeInfo = ` (${selectedSize})`;
            }
            
            const itemsOrdered = [{
                id: selectedItem.id,
                name: selectedItem.name + sizeInfo,
                price: originalPrice,
                qty: 1,
                discount_applied: appliedDiscount,
                points_used: discountPointsUsed,
                final_price: finalPrice
            }];

            msgDiv.innerHTML = '<div style="color:#FFD700;">Placing order...</div>';

            try {
                // Deduct points if discount was applied
                if (discountPointsUsed > 0) {
                    await deductPoints(loggedInUser.email, discountPointsUsed, `Used ${discountPointsUsed} points for discount on ${selectedItem.name}`);
                    await loadUserPoints(loggedInUser.email);
                }

                const { error } = await supabase.from('orders').insert([{
                    customer_name: name,
                    customer_phone: phone,
                    customer_email: loggedInUser.email,
                    customer_address: address,
                    items_ordered: itemsOrdered,
                    total_price: finalPrice,
                    original_price: originalPrice,
                    discount_amount: appliedDiscount,
                    points_used: discountPointsUsed,
                    status: 'Pending'
                }]);

                if (error) throw error;

                msgDiv.innerHTML = '<div class="msg-success">✅ Order placed successfully!</div>';
                showToast(`🎉 Order placed! ${selectedItem.name}${sizeInfo} - PKR ${finalPrice}`);
                
                setTimeout(() => { 
                    closeOrderModal(); 
                }, 2000);

            } catch(err) {
                console.error(err);
                msgDiv.innerHTML = `<div class="msg-error">❌ Error: ${err.message}</div>`;
            }
        }

        // ===== FILTERS =====
        function setupFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.getAttribute('data-category');
                    renderMenu();
                });
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('orderToast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
        }

        // Make functions global for onclick
        window.openOrderModal = openOrderModal;
        window.closeOrderModal = closeOrderModal;
        window.placeDirectOrder = placeDirectOrder;
        window.selectSize = selectSize;
        window.applyPointsDiscount = applyPointsDiscount;
        window.removeDiscount = removeDiscount;

        // Init
        document.addEventListener('DOMContentLoaded', async () => {
            await checkSession();
            await loadMenuItems();
            setupFilters();
        });

        const selectedItemId = sessionStorage.getItem('selectedItemId');

        // Add this to menu.html script section
const preselectedItemId = sessionStorage.getItem('selectedItemId');
if (preselectedItemId) {
    setTimeout(() => {
        const item = allMenuItems.find(i => i.id === preselectedItemId);
        if (item) {
            openOrderModal(item.id);
            sessionStorage.removeItem('selectedItemId');
        }
    }, 500);
}
    </script>
</body>
</html>
