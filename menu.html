<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodfight - Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; font-family: 'Poppins', sans-serif; color: white; }
        .navbar { background: #0a0a0a; padding: 1rem 2rem; border-bottom: 2px solid #FFD700; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: auto; }
        .logo { font-family: 'Bebas Neue', cursive; color: #FFD700; font-size: 2rem; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: white; text-decoration: none; }
        .nav-links a.active { color: #FFD700; }
        .hamburger { display: none; font-size: 1.5rem; cursor: pointer; color: #FFD700; }
        .filter-bar { display: flex; justify-content: center; gap: 0.8rem; flex-wrap: wrap; margin: 2rem auto; }
        .filter-btn { background: #1a1a1a; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; color: white; cursor: pointer; }
        .filter-btn.active { background: #FFD700; color: #0a0a0a; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; padding: 2rem; max-width: 1200px; margin: auto; }
        .menu-card { background: #111; border-radius: 20px; padding: 1rem; position: relative; border: 1px solid #2a2a2a; }
        .points-badge { position: absolute; top: 10px; right: 10px; background: #FFD700; color: #000; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .price { color: #FFD700; font-weight: bold; margin: 0.5rem 0; font-size: 1.2rem; }
        button { background: #FFD700; color: #0a0a0a; border: none; padding: 0.6rem; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 0.5rem; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.open { display: flex; }
        .order-modal { background: #111; border: 2px solid #FFD700; border-radius: 24px; padding: 2rem; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
        .order-input { width: 100%; padding: 0.8rem; background: #222; border: 1px solid #444; border-radius: 12px; color: white; margin-bottom: 1rem; }
        .order-label { display: block; color: #FFD700; margin-bottom: 0.3rem; }
        .size-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .size-option { background: #222; border: 1px solid #444; border-radius: 12px; padding: 0.5rem; text-align: center; cursor: pointer; flex: 1; }
        .size-option.selected { background: #FFD700; color: #0a0a0a; }
        .discount-section { background: #1a1a1a; border-radius: 12px; padding: 1rem; margin: 1rem 0; }
        .points-badge-large { background: #FFD700; color: #0a0a0a; padding: 0.3rem 0.8rem; border-radius: 20px; font-weight: bold; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #FFD700; color: #000; padding: 12px 24px; border-radius: 50px; display: none; z-index: 2000; font-weight: bold; }
        @media (max-width: 768px) { .nav-links { display: none; } .hamburger { display: block; } .menu-grid { padding: 1rem; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">FOODFIGHT</div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html" class="active">Menu</a></li>
                <li><a href="game.html">Game</a></li>
                <li><a href="account.html">Contact</a></li>
                <li><a href="account.html">Account</a></li>
            </ul>
            <div class="hamburger" id="hamburger">☰</div>
        </div>
    </nav>

    <div class="filter-bar" id="filterBar"></div>
    <div class="menu-grid" id="menuGrid">Loading...</div>

    <div class="modal-overlay" id="orderModal">
        <div class="order-modal">
            <h2 style="color:#FFD700;">Place Order</h2>
            <div id="orderContent"></div>
        </div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
        let allItems = [], currentUser = null, selectedItem = null, selectedSize = null;
        let userPoints = 0, appliedDiscount = 0, discountPointsUsed = 0;
        let discountConfig = { pointsToPkr: 1, maxDiscountPercent: 50, minPointsToRedeem: 10 };
        const pizzaSizes = { 'Small':0.7, 'Medium':1, 'Large':1.4, 'Extra Large':1.8 };

        function showToast(msg, isErr = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = isErr ? '#ff4444' : '#FFD700';
            t.style.color = isErr ? 'white' : '#0a0a0a';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        async function loadUserPoints() {
            if (!currentUser) return 0;
            const { data } = await supabase.from('points_transactions').select('points').eq('user_email', currentUser.email);
            const total = data?.reduce((s, t) => s + (t.points || 0), 0) || 0;
            userPoints = total;
            return total;
        }

        async function deductPoints(points, reason) {
            if (points <= 0) return;
            await supabase.from('points_transactions').insert([{ user_email: currentUser.email, points: -points, reason: reason }]);
            await loadUserPoints();
        }

        async function loadDiscountConfig() {
            const { data } = await supabase.from('discount_config').select('*').single();
            if (data) discountConfig = data;
        }

        async function checkSession() {
            const { data: { user } } = await supabase.auth.getUser();
            currentUser = user;
            if (currentUser) await loadUserPoints();
            await loadDiscountConfig();
            await loadMenu();
        }

        async function loadMenu() {
            const { data } = await supabase.from('menu_items').select('*').eq('is_available', true);
            allItems = data || [];
            renderFilters();
            renderMenu('all');
        }

        function renderFilters() {
            const cats = [...new Set(allItems.map(i => i.category))];
            const bar = document.getElementById('filterBar');
            bar.innerHTML = `<button class="filter-btn active" data-cat="all">ALL</button>` + cats.map(c => `<button class="filter-btn" data-cat="${c}">${c}</button>`).join('');
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderMenu(btn.dataset.cat);
                });
            });
        }

        function renderMenu(cat) {
            const grid = document.getElementById('menuGrid');
            let filtered = cat === 'all' ? allItems : allItems.filter(i => i.category === cat);
            if (!filtered.length) { grid.innerHTML = '<p>No items</p>'; return; }
            grid.innerHTML = filtered.map(item => `
                <div class="menu-card">
                    <div class="points-badge">🏆 ${item.points_reward || 10} pts</div>
                    <img src="${item.image_url || 'https://placehold.co/300x200/111/FFD700?text=Food'}" style="width:100%; border-radius:12px;">
                    <h3>${escapeHtml(item.name)}</h3>
                    <p>${escapeHtml(item.description?.substring(0,60) || '')}</p>
                    <div class="price">PKR ${item.price}</div>
                    <button onclick="openOrder('${item.id}')">Order Now</button>
                </div>
            `).join('');
        }

        window.openOrder = async function(id) {
            if (!currentUser) {
                showToast('Please login first', true);
                setTimeout(() => window.location.href = 'account.html', 1500);
                return;
            }
            selectedItem = allItems.find(i => i.id === id);
            selectedSize = selectedItem.category === 'Pizza' ? 'Medium' : null;
            appliedDiscount = 0;
            discountPointsUsed = 0;
            renderOrderModal();
            document.getElementById('orderModal').classList.add('open');
        };

        function renderOrderModal() {
            const isPizza = selectedItem.category === 'Pizza';
            let basePrice = selectedItem.price;
            if (isPizza && selectedSize) basePrice = Math.round(selectedItem.price * pizzaSizes[selectedSize]);
            let finalPrice = Math.max(basePrice - appliedDiscount, 0);

            let sizeHtml = '';
            if (isPizza) {
                sizeHtml = `
                    <label class="order-label">Size:</label>
                    <div class="size-selector">
                        ${Object.entries(pizzaSizes).map(([size, mult]) => `
                            <div class="size-option ${selectedSize === size ? 'selected' : ''}" onclick="selectSize('${size}')">
                                ${size}<br>PKR ${Math.round(selectedItem.price * mult)}
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            const maxDiscountPkr = (basePrice * discountConfig.maxDiscountPercent) / 100;
            const maxPointsUsable = Math.floor(maxDiscountPkr / discountConfig.pointsToPkr);
            const canUsePoints = userPoints >= discountConfig.minPointsToRedeem && maxPointsUsable >= discountConfig.minPointsToRedeem;

            document.getElementById('orderContent').innerHTML = `
                <div><h3>${escapeHtml(selectedItem.name)}${isPizza ? ` (${selectedSize})` : ''}</h3><p>Price: PKR ${basePrice}</p></div>
                ${sizeHtml}
                <div class="discount-section">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span>Your Points:</span>
                        <span class="points-badge-large">🏆 ${userPoints} pts</span>
                    </div>
                    ${canUsePoints ? `
                        <label class="order-label">Redeem points (${discountConfig.pointsToPkr} pt = 1 PKR, max ${discountConfig.maxDiscountPercent}% off)</label>
                        <input type="number" id="pointsToUse" class="order-input" placeholder="Enter points" min="${discountConfig.minPointsToRedeem}" max="${Math.min(userPoints, maxPointsUsable)}">
                        <button onclick="applyDiscount()">Apply Discount</button>
                    ` : `<p style="color:#aaa;">Not enough points (min ${discountConfig.minPointsToRedeem})</p>`}
                    ${appliedDiscount > 0 ? `<p style="color:#FFD700;">Discount: -PKR ${appliedDiscount} (${discountPointsUsed} pts)</p><button onclick="removeDiscount()" style="background:#333;">Remove</button>` : ''}
                </div>
                <div><strong>Total: PKR ${finalPrice}</strong></div>
                <label class="order-label">Full Name</label>
                <input type="text" id="custName" class="order-input" value="${escapeHtml(currentUser?.user_metadata?.full_name || '')}">
                <label class="order-label">Phone</label>
                <input type="text" id="custPhone" class="order-input" value="${escapeHtml(currentUser?.user_metadata?.phone || '')}">
                <label class="order-label">Address</label>
                <textarea id="custAddress" class="order-input" rows="2">${escapeHtml(currentUser?.user_metadata?.address || '')}</textarea>
                <button onclick="placeOrder(${finalPrice}, ${basePrice})">Confirm Order</button>
                <button onclick="closeOrderModal()" style="background:#333;">Cancel</button>
            `;
        }

        window.selectSize = function(size) {
            selectedSize = size;
            appliedDiscount = 0;
            discountPointsUsed = 0;
            renderOrderModal();
        };

        window.applyDiscount = function() {
            const pointsInput = document.getElementById('pointsToUse');
            if (!pointsInput) return;
            let points = parseInt(pointsInput.value);
            if (isNaN(points) || points < discountConfig.minPointsToRedeem) {
                showToast(`Minimum ${discountConfig.minPointsToRedeem} points`, true);
                return;
            }
            if (points > userPoints) {
                showToast(`You only have ${userPoints} points`, true);
                return;
            }
            const isPizza = selectedItem.category === 'Pizza';
            let basePrice = selectedItem.price;
            if (isPizza && selectedSize) basePrice = Math.round(selectedItem.price * pizzaSizes[selectedSize]);
            const maxDiscount = (basePrice * discountConfig.maxDiscountPercent) / 100;
            let discountAmount = points * discountConfig.pointsToPkr;
            if (discountAmount > maxDiscount) discountAmount = maxDiscount;
            if (discountAmount <= 0) { showToast('Discount invalid', true); return; }
            appliedDiscount = discountAmount;
            discountPointsUsed = points;
            renderOrderModal();
        };

        window.removeDiscount = function() {
            appliedDiscount = 0;
            discountPointsUsed = 0;
            renderOrderModal();
        };

        window.placeOrder = async function(finalPrice, originalPrice) {
            const name = document.getElementById('custName')?.value.trim();
            const phone = document.getElementById('custPhone')?.value.trim();
            const address = document.getElementById('custAddress')?.value.trim();
            if (!name || !phone || !address) { showToast('Fill all fields', true); return; }

            const isPizza = selectedItem.category === 'Pizza';
            let itemName = selectedItem.name + (isPizza && selectedSize ? ` (${selectedSize})` : '');
            const itemsOrdered = [{ id: selectedItem.id, name: itemName, price: originalPrice, qty: 1, size: selectedSize || null }];

            // Deduct points only if discount was applied and points>0
            if (discountPointsUsed > 0) {
                await deductPoints(discountPointsUsed, `Used ${discountPointsUsed} points for discount on ${selectedItem.name}`);
            }

            // Insert order with explicit values (never null)
            const { error } = await supabase.from('orders').insert({
                customer_name: name,
                customer_phone: phone,
                customer_email: currentUser.email,
                customer_address: address,
                items_ordered: itemsOrdered,
                original_price: originalPrice,
                discount_amount: appliedDiscount,
                points_used: discountPointsUsed,
                total_price: finalPrice,
                status: 'Pending'
            });

            if (error) { showToast('Order failed: ' + error.message, true); return; }
            showToast(`Order placed! PKR ${finalPrice}`);
            closeOrderModal();
        };

        function closeOrderModal() {
            document.getElementById('orderModal').classList.remove('open');
            selectedItem = null;
            selectedSize = null;
            appliedDiscount = 0;
            discountPointsUsed = 0;
        }

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

        document.getElementById('hamburger')?.addEventListener('click', () => document.getElementById('navLinks').classList.toggle('active'));
        window.closeOrderModal = closeOrderModal;

        checkSession();
    </script>
</body>
</html>
