<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">CLOTH SHOP</div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="article.html">article</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="account.html">Account</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>
    <div class="contact-container">
        <h1>Contact Us</h1>
        <p>If you have any questions or inquiries, please feel free to contact us using the form below:</p>
        <form class="contact-form">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>
    <style>
       body {
    background: linear-gradient(135deg, #fcfcfc 0%, #1a1a1a 100%);
    color: #e4e4e4;
    font-family: 'Poppins', sans-serif;
    line-height: 1.6;
    overflow-x: hidden;
}
        .navbar {
    position: sticky;
    top: 0;
    background: #cacaca3d;
    z-index: 1000;
    border-bottom: 1px solid #222;
    backdrop-filter: blur(10px);
}

.nav-container {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 2rem;
    font-weight: bold;
    color: #000000;
    letter-spacing: 2px;
}

.nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
}

.nav-links a {
    color: rgb(50, 50, 50);
    text-decoration: none;
    font-size: 1.2rem;
    transition: color 0.3s;
}

.nav-links a:hover, .nav-links a.active {
    color: #FFD700;
}

.hamburger {
    display: none;
    font-size: 1.8rem;
    cursor: pointer;
    color: #FFD700;
}


        .contact-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #adacac86;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.12);
        }
        .contact-form {
            display: flex;
            flex-direction: column;
        }
        .contact-form label {
            margin-bottom: 10px;
            font-weight: bold;
            color: #000;
        }
        .contact-form input,
        .contact-form textarea {
            margin-bottom: 15px;
            padding: 10px;
            border: 2px solid #000000;
            border-radius: 4px;
        }
        .contact-form button {
            padding: 9px 19px;
            background-color: #6f70707c;
            color: rgb(0, 0, 0);
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }
        .contact-form button:hover {
            background-color: #572e2eef;
        }
    </style>
</body>
</html>
